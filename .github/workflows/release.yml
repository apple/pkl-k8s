# Generated from Workflow.pkl. DO NOT EDIT.
name: Release
'on':
  push:
    branches-ignore:
    - '**'
    tags-ignore:
    - k8s@**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  create-github-release:
    name: Create GitHub Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Setup Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: temurin
    - name: Build and test
      run: ./gradlew build
    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        VERSION: ${{ github.ref_name }}
      run: |-
        EXPECTED_VERSION=$(cat VERSION)

        if [ "${EXPECTED_VERSION}" != "${VERSION}" ]; then
          echo "Mismatching versions!"
          echo "VERSION has ${EXPECTED_VERSION}"
          echo "Inferred version from Git tag is ${VERSION}"
          echo "Update VERSION to match the tag, and re-tag."
          exit 1
        fi

        gh release create k8s@${VERSION} \
          --notes "Release k8s version ${VERSION}" \
          --title "k8s@${VERSION}" \
          --verify-tag \
          build/distributions/k8s/*
  trigger-downstream-builds:
    if: github.repository_owner == 'apple'
    needs:
    - create-github-release
    runs-on: ubuntu-latest
    steps:
    - name: Create app token
      id: app-token
      uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
      with:
        app-id: ${{ secrets.PKL_CI_CLIENT_ID }}
        private-key: ${{ secrets.PKL_CI }}
        owner: ${{ github.repository_owner }}
    - name: Trigger pkl-package-docs build
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        SOURCE_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |-
        gh workflow run \
          --repo apple/pkl-package-docs \
          --ref main \
          --field source_run="${SOURCE_RUN}" \
          main.yml
